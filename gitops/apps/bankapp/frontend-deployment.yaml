apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: bankapp
  labels:
    app.kubernetes.io/name: banking-frontend
    app.kubernetes.io/part-of: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: banking-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banking-frontend
        app.kubernetes.io/part-of: bankapp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/wajihahmed269/ai-banking-frontend:9b3cdb1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
