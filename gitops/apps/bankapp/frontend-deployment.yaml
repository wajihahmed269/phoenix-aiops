apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp-frontend
  namespace: bankapp
  labels:
    app.kubernetes.io/name: bankapp-frontend
    app.kubernetes.io/part-of: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bankapp-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bankapp-frontend
        app.kubernetes.io/part-of: bankapp
    spec:
      containers:
        - name: frontend
          image: REPLACE_WITH_BANKAPP_FRONTEND_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: bankapp-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
