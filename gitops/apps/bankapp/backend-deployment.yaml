apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-backend
  namespace: bankapp
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: banking-backend
  template:
    metadata:
      annotations:
        bankapp.phoenix-ops/config-version: cors-local-8088-v1
      labels:
        app.kubernetes.io/name: banking-backend
        app.kubernetes.io/part-of: bankapp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z bankapp-mysql 3306; do
                echo "waiting for mysql..."
                sleep 3
              done
              echo "mysql is reachable"
          imagePullPolicy: IfNotPresent
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      containers:
        - name: backend
          image: ghcr.io/wajihahmed269/ai-banking-backend:9b3cdb1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: bankapp-config
            - secretRef:
                name: bankapp-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
