apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-backend
  namespace: bankapp
  labels:
    app.kubernetes.io/name: banking-backend
    app.kubernetes.io/part-of: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: banking-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banking-backend
        app.kubernetes.io/part-of: bankapp
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/wajihahmed269/ai-banking-backend:9b3cdb1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: bankapp-config
            - secretRef:
                name: bankapp-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
