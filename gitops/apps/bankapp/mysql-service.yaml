    app.kubernetes.io/part-of: bankapp
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bankapp-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
