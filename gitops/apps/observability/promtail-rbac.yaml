apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: observability
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phoenix-observability-promtail
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: observability
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phoenix-observability-promtail
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: phoenix-observability-promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: observability
