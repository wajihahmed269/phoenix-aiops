apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: observability
data:
  cluster-health.json: |
    {
      "uid": "phoenix-cluster-health",
      "title": "Phoenix Cluster Health",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": [
        "phoenix",
        "cluster"
      ],
      "panels": [
        {
          "type": "stat",
          "title": "Prometheus Targets Up",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(up)",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Ready Nodes",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node CPU Usage %",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node Memory Usage %",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Restarts 1h",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[1h]))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Deployment Availability",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (namespace, deployment) (kube_deployment_status_replicas_available)",
              "refId": "A"
            }
          ]
        }
      ]
    }
  bankapp-ops.json: |
    {
      "uid": "phoenix-bankapp-ops",
      "title": "BankApp Operations",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": [
        "phoenix",
        "bankapp"
      ],
      "panels": [
        {
          "type": "stat",
          "title": "BankApp Pods Ready",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(kube_pod_container_status_ready{namespace=\"bankapp\",condition=\"true\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Backend Ready",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(kube_pod_container_status_ready{namespace=\"bankapp\",pod=~\"banking-backend.*\",condition=\"true\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "BankApp Restarts",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (pod, container) (increase(kube_pod_container_status_restarts_total{namespace=\"bankapp\"}[1h]))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "BankApp Container CPU",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (pod, container) (rate(container_cpu_usage_seconds_total{namespace=\"bankapp\",container!=\"\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "logs",
          "title": "BankApp Logs",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 10
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "{namespace=\"bankapp\"}",
              "refId": "A"
            }
          ]
        }
      ]
    }
