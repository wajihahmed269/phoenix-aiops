apiVersion: apps/v1
kind: Deployment
metadata:
  name: budget-service
  namespace: pfms-demo
  labels:
    app.kubernetes.io/part-of: phoenix-aiops
    app.kubernetes.io/name: budget-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: budget-service
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: phoenix-aiops
        app.kubernetes.io/name: budget-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: budget-service
          image: ghcr.io/wajihahmed269/pfms-budget-service:pfms-mvp-v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_CLOUD_CONFIG_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: SPRING_CLOUD_CONFIG_ENABLED
            - name: EUREKA_CLIENT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: EUREKA_CLIENT_ENABLED
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: SPRING_CLOUD_DISCOVERY_ENABLED
            - name: PFMS_NOTIFICATIONS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: PFMS_NOTIFICATIONS_ENABLED
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/pfms_mvp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pfms-mvp-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pfms-mvp-secret
                  key: MYSQL_PASSWORD
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 1Gi
