apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pfms-demo
  labels:
    app.kubernetes.io/part-of: phoenix-aiops
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: phoenix-aiops
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/wajihahmed269/pfms-api-gateway:pfms-mvp-v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_CLOUD_CONFIG_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: SPRING_CLOUD_CONFIG_ENABLED
            - name: EUREKA_CLIENT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: EUREKA_CLIENT_ENABLED
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: SPRING_CLOUD_DISCOVERY_ENABLED
            - name: BUDGET_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: BUDGET_SERVICE_URL
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: CORS_ALLOWED_ORIGINS
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/pfms_mvp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pfms-mvp-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pfms-mvp-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pfms-mvp-secret
                  key: JWT_SECRET
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: pfms-mvp-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 1Gi
