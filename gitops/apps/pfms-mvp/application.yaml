apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pfms-mvp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wajihahmed269/phoenix-aiops.git
    targetRevision: HEAD
    path: gitops/environments/dev/pfms-mvp
  destination:
    server: https://kubernetes.default.svc
    namespace: pfms-demo
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
