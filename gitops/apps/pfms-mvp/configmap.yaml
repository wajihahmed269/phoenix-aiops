apiVersion: v1
kind: ConfigMap
metadata:
  name: pfms-mvp-config
  namespace: pfms-demo
  labels:
    app.kubernetes.io/part-of: phoenix-aiops
    app.kubernetes.io/name: pfms-mvp
data:
  SPRING_PROFILES_ACTIVE: "mvp"
  SPRING_CLOUD_CONFIG_ENABLED: "false"
  EUREKA_CLIENT_ENABLED: "false"
  SPRING_CLOUD_DISCOVERY_ENABLED: "false"
  PFMS_NOTIFICATIONS_ENABLED: "false"
  BUDGET_SERVICE_URL: "http://budget-service:8082"
  REACT_APP_API_GATEWAY_URL: ""
  CORS_ALLOWED_ORIGINS: "http://pfms-ui,http://localhost:3000"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
