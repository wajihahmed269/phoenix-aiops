---
- name: Resolve K3s server host
  ansible.builtin.set_fact:
    k3s_server_host: "{{ groups['control_plane'][0] | default(groups['k3s_server'][0] | default(groups['masters'][0] | default(''))) }}"
  when: k3s_server_host is not defined

- name: Validate K3s server host is configured
  ansible.builtin.assert:
    that:
      - k3s_server_host | length > 0
    fail_msg: "Set k3s_server_host or define a control_plane, k3s_server, or masters inventory group."

- name: Resolve K3s server URL
  ansible.builtin.set_fact:
    k3s_agent_server_url: >-
      {{ hostvars[k3s_server_host].k3s_server_url
         | default('https://' ~ (
             hostvars[k3s_server_host].k3s_server_private_ip
             | default(hostvars[k3s_server_host].ansible_host_private
             | default(hostvars[k3s_server_host].ansible_default_ipv4.address
             | default(hostvars[k3s_server_host].ansible_host
             | default(k3s_server_host)))))
           ~ ':6443') }}

- name: Resolve K3s node token
  ansible.builtin.set_fact:
    k3s_agent_token: "{{ hostvars[k3s_server_host].k3s_node_token | default(k3s_node_token | default('')) }}"
  no_log: true

- name: Validate K3s node token is available
  ansible.builtin.assert:
    that:
      - k3s_agent_token | length > 0
    fail_msg: "K3s node token is unavailable. Run the k3s_server role first or set k3s_node_token."
  no_log: true

- name: Install K3s agent
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | K3S_URL="{{ k3s_agent_server_url }}" K3S_TOKEN="{{ k3s_agent_token }}" sh -s - agent {{ k3s_agent_extra_args | default('') }}
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  become: true
  no_log: true

- name: Enable and start K3s agent
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
  become: true
